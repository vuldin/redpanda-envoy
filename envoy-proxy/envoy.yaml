admin:
  address:
    socket_address:
      protocol: TCP
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
  - name: broker_0_listener
    address:
      socket_address:
        protocol: TCP
        address: 0.0.0.0
        port_value: 9092
    filter_chains:
    - filters:
      - name: envoy.filters.network.tcp_proxy
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
          stat_prefix: broker_0_tcp
          cluster: redpanda_cluster
          access_log:
          - name: envoy.access_loggers.stdout
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog

  - name: broker_1_listener
    address:
      socket_address:
        protocol: TCP
        address: 0.0.0.0
        port_value: 9093
    filter_chains:
    - filters:
      - name: envoy.filters.network.tcp_proxy
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
          stat_prefix: broker_1_tcp
          cluster: redpanda_cluster
          access_log:
          - name: envoy.access_loggers.stdout
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog

  - name: broker_2_listener
    address:
      socket_address:
        protocol: TCP
        address: 0.0.0.0
        port_value: 9094
    filter_chains:
    - filters:
      - name: envoy.filters.network.tcp_proxy
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
          stat_prefix: broker_2_tcp
          cluster: redpanda_cluster
          access_log:
          - name: envoy.access_loggers.stdout
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog

  clusters:
  - name: redpanda_cluster
    connect_timeout: 5s
    type: STRICT_DNS
    lb_policy: ROUND_ROBIN
    health_checks:
    - timeout: 3s
      interval: 5s
      interval_jitter: 1s
      unhealthy_threshold: 3
      healthy_threshold: 2
      http_health_check:
        path: /schemas/types
      no_traffic_interval: 10s
      unhealthy_interval: 10s
      unhealthy_edge_interval: 30s
      healthy_edge_interval: 10s
    load_assignment:
      cluster_name: redpanda_cluster
      endpoints:
      - priority: 0
        lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: primary-broker-0
                port_value: 9092
            health_check_config:
              port_value: 8081
        - endpoint:
            address:
              socket_address:
                address: primary-broker-1
                port_value: 9092
            health_check_config:
              port_value: 8081
        - endpoint:
            address:
              socket_address:
                address: primary-broker-2
                port_value: 9092
            health_check_config:
              port_value: 8081
      - priority: 1
        lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: secondary-broker-0
                port_value: 9092
            health_check_config:
              port_value: 8081
        - endpoint:
            address:
              socket_address:
                address: secondary-broker-1
                port_value: 9092
            health_check_config:
              port_value: 8081
        - endpoint:
            address:
              socket_address:
                address: secondary-broker-2
                port_value: 9092
            health_check_config:
              port_value: 8081
    common_lb_config:
      healthy_panic_threshold:
        value: 0.0
    outlier_detection:
      consecutive_5xx: 3
      consecutive_gateway_failure: 3
      interval: 10s
      base_ejection_time: 30s
      max_ejection_percent: 50